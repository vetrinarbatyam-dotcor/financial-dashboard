    <style>
      * { font-family: 'Noto Sans Hebrew', sans-serif; }
      body { direction: rtl; background: #0f172a; }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #1e293b; }
      ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #64748b; }

      /* Tooltip */
      .tooltip-wrapper { position: relative; display: inline-flex; align-items: center; }
      .tooltip-box {
        visibility: hidden;
        opacity: 0;
        position: absolute;
        bottom: 130%;
        right: 50%;
        transform: translateX(50%);
        background: #1e293b;
        color: #e2e8f0;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 12px;
        line-height: 1.5;
        white-space: normal;
        width: 220px;
        z-index: 50;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        transition: opacity 0.15s ease, visibility 0.15s ease;
        text-align: right;
      }
      .tooltip-box::after {
        content: '';
        position: absolute;
        top: 100%;
        right: 50%;
        transform: translateX(50%);
        border: 6px solid transparent;
        border-top-color: #334155;
      }
      .tooltip-wrapper:hover .tooltip-box {
        visibility: visible;
        opacity: 1;
      }

      /* Gauge animation */
      .gauge-ring {
        transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Shimmer loading */
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .shimmer {
        background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }

      /* Pulse dot */
      @keyframes pulseDot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(0.85); }
      }
      .pulse-dot { animation: pulseDot 1.2s ease-in-out infinite; }

      /* Progress bar fill */
      @keyframes progressFill {
        from { width: 0%; }
        to { width: var(--target-width); }
      }

      /* Accordion */
      .accordion-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
      }
      .accordion-content.open {
        max-height: 1000px;
      }

      /* Card hover */
      .investor-card {
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .investor-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 32px rgba(99,102,241,0.25);
      }

      /* Glow effect for high scores */
      .score-glow-green { box-shadow: 0 0 20px rgba(34,197,94,0.3); }
      .score-glow-yellow { box-shadow: 0 0 20px rgba(234,179,8,0.3); }
      .score-glow-red { box-shadow: 0 0 20px rgba(239,68,68,0.3); }
    </style>
